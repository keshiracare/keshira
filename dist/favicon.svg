<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Inner circular white background (keeps the inside of the logo white) -->
  <circle cx="256" cy="256" r="216" fill="#FFFFFF" />
  
  <!-- Outer Dual-Colored Swoosh Ring -->
  <!-- Green ring part (Forest Green - #2F4D27) -->
  <path d="M 230 40 A 216 216 0 1 0 468 220" fill="none" stroke="#2F4D27" stroke-width="16" stroke-linecap="round" />
  <!-- Gold ring part (Ayurvedic Gold - #BB9546) -->
  <path d="M 256 40 A 216 216 0 0 1 472 240" fill="none" stroke="#BB9546" stroke-width="16" stroke-linecap="round" />
  
  <!-- The K monogram -->
  <!-- Vertical serif stem (green) -->
  <path d="M 165 140 h 60 v 14 h -14 v 204 h 14 v 14 h -60 v -14 h 14 v -204 h -14 Z" fill="#2F4D27" />
  
  <!-- Upper diagonal arm (green) -->
  <path d="M 211 250 L 325 140 h 50 L 250 262 Z" fill="#2F4D27" />
  
  <!-- Lower diagonal leg (green, curving gracefully) -->
  <path d="M 211 258 C 255 278, 295 318, 375 355 C 385 360, 395 365, 405 365 v 7 h -85 C 275 350, 235 310, 211 283 Z" fill="#2F4D27" />
  
  <!-- Lower leg gold ribbon highlight -->
  <path d="M 230 270 C 275 305, 315 345, 390 362" fill="none" stroke="#BB9546" stroke-width="6" stroke-linecap="round" />
  
  <!-- Leaves on the left stem -->
  <!-- Upper small leaf (pointing up-left) -->
  <path d="M 190 230 C 170 210, 150 180, 140 160 C 160 175, 180 205, 190 230 Z" fill="#2F4D27" />
  <path d="M 190 230 Q 165 195 140 160" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Lower large leaf (pointing down-left) -->
  <path d="M 190 290 C 170 295, 125 270, 105 250 C 130 240, 175 270, 190 290 Z" fill="#2F4D27" />
  <path d="M 190 290 Q 150 265 105 250" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
</svg>
